<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💌 A confession for you... | Will you be my Girlfriend?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;600;700;800&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff85a1;--rose:#ff4d79;--lilac:#d4a8e8;--peach:#ffb89a;
  --deep:#7a1f40;--night:#0d0019;--cream:#fff8fa;--gold:#ffd966;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;}

/* ═══════════════════════════════════════════════════════════════════════════ */
/*                               BACKGROUND PREMIUM                            */
/* ═══════════════════════════════════════════════════════════════════════════ */
#scene{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#parallax-bg{position:absolute;inset:0;}

.bg-grad{
  position:absolute;inset:-60%;width:220%;height:220%;
  background:linear-gradient(125deg,
    #fce4ec 0%,#f8c8dc 10%,#ead5f8 22%,#dceeff 34%,
    #ffe8d6 46%,#ffd6e8 58%,#eadcff 70%,#d8f0ff 82%,#fce4ec 100%);
  background-size:500% 500%;
  animation:bgMove 22s ease infinite;
}
@keyframes bgMove{
  0%{background-position:0% 0%;transform:rotate(0deg) scale(1);}
  33%{background-position:100% 20%;}
  66%{background-position:50% 100%;transform:rotate(1.8deg) scale(1.05);}
  100%{background-position:0% 0%;transform:rotate(0deg) scale(1);}
}

/* Aurora overlay */
.aurora{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 30%, rgba(180,130,255,0.12), transparent 60%),
             radial-gradient(ellipse at 80% 70%, rgba(255,120,180,0.1), transparent 60%);
  animation:auroraFloat 14s ease-in-out infinite;
  pointer-events:none;
  z-index:0;
}
@keyframes auroraFloat{0%,100%{opacity:0.5;transform:scale(1);}50%{opacity:0.9;transform:scale(1.08);}}

/* Bokeh layer */
.bokeh{position:absolute;border-radius:50%;filter:blur(50px);opacity:0;
  animation:bkF var(--d) ease-in-out infinite var(--dl);}
@keyframes bkF{0%{opacity:0;transform:scale(.7) translateY(20px);}40%{opacity:var(--o);}70%{opacity:var(--o);}100%{opacity:0;transform:scale(1.3) translateY(-30px);}}
/* Sparkle stars */
.sp{position:absolute;width:var(--s);height:var(--s);
  animation:spTw var(--d) ease-in-out infinite var(--dl);}
.sp::before,.sp::after{content:'';position:absolute;inset:0;background:#fff;border-radius:50%;box-shadow:0 0 7px 3px rgba(255,200,225,.9);}
.sp::after{clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);background:rgba(255,225,240,.95);}
@keyframes spTw{0%,100%{opacity:0;transform:scale(0) rotate(0deg);}20%{opacity:1;transform:scale(1) rotate(45deg);}80%{opacity:.7;transform:scale(.8) rotate(95deg);}}

/* Falling hearts background */
.fh{position:absolute;top:-70px;font-size:var(--s);opacity:0;
  animation:fhDrop var(--d) linear infinite var(--dl);
  filter:drop-shadow(0 0 6px rgba(255,100,150,.45));}
@keyframes fhDrop{0%{opacity:0;transform:translateY(0) rotate(var(--r)) scale(.4);}10%{opacity:.85;}88%{opacity:.35;}100%{opacity:0;transform:translateY(115vh) rotate(calc(var(--r)+380deg)) scale(1.2);}}

/* Shooting stars */
.shooting-star{position:absolute;top:-20px;width:2px;height:2px;background:linear-gradient(135deg,#fff,var(--gold));border-radius:50%;animation:shootStar linear forwards;}
@keyframes shootStar{0%{transform:translateX(0) translateY(0);opacity:1;width:2px;}70%{opacity:0.8;}100%{transform:translateX(280px) translateY(180px);opacity:0;width:0px;}}

/* Glitter particles */
.glitter{position:absolute;width:4px;height:4px;background:var(--gold);border-radius:50%;animation:glitterFade 1.5s ease-out forwards;}
@keyframes glitterFade{0%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(0);}}

/* Vignette */
.vig{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 45%,rgba(160,70,120,.3) 100%);z-index:1;}
  /* ═══════════════════════════════════════════════════════════════════════════ */
/*                               CARD PREMIUM                                 */
/* ═══════════════════════════════════════════════════════════════════════════ */
.card{
  position:relative;z-index:10;
  background:rgba(255,255,255,.6);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1.5px solid rgba(255,170,200,.55);
  border-radius:48px;
  padding:32px 42px 38px;
  max-width:520px;width:92%;
  box-shadow:0 15px 60px rgba(255,100,150,.25),0 2px 14px rgba(255,150,180,.12),inset 0 1px 0 rgba(255,255,255,.8);
  text-align:center;
  animation:cardIn 1.4s cubic-bezier(.16,1,.3,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(60px) scale(.88);}to{opacity:1;transform:none;}}
.card::before{
  content:'';position:absolute;top:0;left:6%;right:6%;height:2.5px;
  background:linear-gradient(90deg,transparent,#ff85a1,#d4a8e8,#ff85a1,transparent);
  border-radius:0 0 50% 50%;
  box-shadow:0 0 22px 6px rgba(255,133,161,.5);
}
.card::after{
  content:'✨';position:absolute;top:-18px;left:20px;font-size:28px;
  animation:spinGlow 3s infinite;
}
@keyframes spinGlow{0%,100%{transform:rotate(0deg) scale(1);opacity:0.6;}50%{transform:rotate(180deg) scale(1.2);opacity:1;}}

/* Decoration */
.deco-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;opacity:0;animation:fUp .7s .35s ease both;}
.deco-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,133,161,.55),transparent);}
.deco-em{font-size:1rem;animation:spinPop 6s ease-in-out infinite var(--dl);}
@keyframes spinPop{0%,100%{transform:rotate(0deg) scale(1);}50%{transform:rotate(180deg) scale(1.4);}}

.scene-label{
  font-family:'Dancing Script',cursive;
  font-size:1rem;color:#b05070;letter-spacing:.07em;
  margin-bottom:12px;opacity:0;animation:fUp .7s .5s ease both;
}

.conf-line1{
  font-family:'Dancing Script',cursive;
  font-size:clamp(1.1rem,4vw,1.5rem);
  color:#8a2040;font-weight:600;
  margin-bottom:6px;opacity:0;animation:fUp .8s .65s ease both;
}
.conf-line2{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.8rem,5.5vw,2.5rem);
  font-weight:700;color:var(--deep);
  line-height:1.2;opacity:0;animation:fUp .8s .82s ease both;
}
.conf-line2 em{font-style:italic;color:#b02050;}
.conf-line3{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.8rem,5.5vw,2.5rem);
  font-weight:700;font-style:italic;color:#b02050;
  margin-bottom:6px;opacity:0;animation:fUp .8s 1s ease both;
}
.conf-sub{
  font-family:'Nunito',sans-serif;
  font-size:.85rem;color:#c07090;
  margin:8px 0 8px;opacity:0;animation:fUp .7s 1.15s ease both;
  line-height:1.5;
}
.hearts-row{display:flex;justify-content:center;gap:8px;margin-bottom:20px;opacity:0;animation:fUp .7s 1.3s ease both;}
.hr-em{font-size:.85rem;animation:hrBeat 2s ease-in-out infinite var(--dl);}
@keyframes hrBeat{0%,100%{transform:scale(1);}40%{transform:scale(1.5);}65%{transform:scale(1.1);}}
@keyframes fUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
/* ═══════════════════════════════════════════════════════════════════════════ */
/*                          CHIBI CAT FULL BODY                               */
/* ═══════════════════════════════════════════════════════════════════════════ */
.cat-wrap{
  position:relative;display:inline-block;
  margin:0 auto 22px;
  opacity:0;animation:fUp 1.1s 1.35s ease both;
}
.cat{
  position:relative;width:130px;height:138px;margin:0 auto;
  cursor:pointer;transform-origin:bottom center;
  animation:catBreath 3s ease-in-out infinite;
  filter:drop-shadow(0 12px 25px rgba(200,140,200,.45));
}
@keyframes catBreath{0%,100%{transform:scaleY(1) scaleX(1);}50%{transform:scaleY(1.04) scaleX(.975);}}

.cat-shadow{position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:70px;height:10px;background:rgba(200,140,200,.25);border-radius:50%;filter:blur(6px);animation:shPulse 3s ease-in-out infinite;}
@keyframes shPulse{0%,100%{width:70px;opacity:.45;}50%{width:82px;opacity:.28;}}

/* Body */
.cat-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:84px;height:82px;background:linear-gradient(160deg,#f8e0f8 0%,#e8c8e8 55%,#d8b0d8 100%);border-radius:48% 48% 44% 44%/52% 52% 48% 48%;box-shadow:0 4px 20px rgba(180,100,180,.18),inset 0 -5px 12px rgba(160,80,160,.12);}
.cat-belly{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);width:48px;height:50px;background:linear-gradient(160deg,#fff0ff,#f8e4f8);border-radius:50%;opacity:.88;}
.cat-stripe{position:absolute;top:6px;left:50%;transform:translateX(-50%);width:3px;height:40px;background:rgba(180,100,180,.15);border-radius:2px;}

/* Tail */
.cat-tail{position:absolute;bottom:8px;right:-18px;width:22px;height:56px;background:linear-gradient(180deg,#d8b0d8,#c89cc8);border-radius:50% 50% 40% 40%;transform:rotate(22deg);transform-origin:bottom left;animation:tailSway 2.5s ease-in-out infinite;}
@keyframes tailSway{0%,100%{transform:rotate(22deg);}50%{transform:rotate(38deg);}}
.cat-tail::after{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:14px;height:14px;background:#c89cc8;border-radius:50%;}

/* Head */
.cat-head{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:82px;height:78px;background:linear-gradient(150deg,#f8e0f8 0%,#eaccea 65%,#d8b8d8 100%);border-radius:50%;box-shadow:0 2px 16px rgba(180,100,180,.16);animation:headTilt 5.5s ease-in-out infinite;transform-origin:bottom center;}
@keyframes headTilt{0%,100%{transform:translateX(-50%) rotate(0deg);}28%{transform:translateX(-50%) rotate(3deg);}72%{transform:translateX(-50%) rotate(-2.5deg);}}

/* Ears */
.cat-ear{position:absolute;width:0;height:0;top:-16px;}
.cat-ear.l{left:10px;border-left:12px solid transparent;border-right:12px solid transparent;border-bottom:28px solid #d8a8d8;animation:earL 4.5s ease-in-out infinite;}
.cat-ear.r{right:10px;border-left:12px solid transparent;border-right:12px solid transparent;border-bottom:28px solid #d8a8d8;animation:earR 4.5s ease-in-out infinite .7s;}
.cat-ear-inner{position:absolute;width:0;height:0;top:6px;left:50%;transform:translateX(-50%);}
.cat-ear-inner.l{border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:17px solid #f0a8d8;}
.cat-ear-inner.r{border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:17px solid #f0a8d8;}
@keyframes earL{0%,100%{transform:rotate(0deg);}40%{transform:rotate(-14deg);}70%{transform:rotate(6deg);}}
@keyframes earR{0%,100%{transform:rotate(0deg);}40%{transform:rotate(14deg);}70%{transform:rotate(-6deg);}}

/* Eyes - Big Kawaii */
.cat-eye{position:absolute;top:24px;}
.cat-eye.l{left:13px;}.cat-eye.r{right:13px;}
.eye-ball{width:19px;height:20px;background:#1a0828;border-radius:50%;box-shadow:0 0 0 3px rgba(255,255,255,.95),0 0 10px rgba(220,150,230,.5);animation:catBlink 3.8s ease-in-out infinite;position:relative;}
.cat-eye.r .eye-ball{animation-delay:.06s;}
@keyframes catBlink{0%,44%,56%,100%{transform:scaleY(1);}50%{transform:scaleY(.06);}}
.eye-ball::after{content:'';position:absolute;width:6px;height:6px;background:white;border-radius:50%;top:2px;left:2px;}
.eye-ball::before{content:'';position:absolute;width:3px;height:3px;background:rgba(255,220,245,.9);border-radius:50%;bottom:3px;right:2px;}
.eye-shine{position:absolute;width:4px;height:4px;background:rgba(255,240,255,.8);border-radius:50%;top:8px;right:1px;animation:eyeShine 2s ease-in-out infinite;}
@keyframes eyeShine{0%,100%{opacity:.5;transform:scale(1);}50%{opacity:1;transform:scale(1.5);}}

/* Blush */
.cat-blush{position:absolute;width:17px;height:10px;background:rgba(255,130,170,.45);border-radius:50%;filter:blur(4px);top:38px;transition:opacity .4s,transform .4s;}
.cat-blush.l{left:8px;}.cat-blush.r{right:8px;}

/* Nose & Mouth */
.cat-nose{position:absolute;top:44px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:5.5px solid transparent;border-right:5.5px solid transparent;border-top:7px solid #ffaacc;}
.cat-mouth{position:absolute;top:52px;left:50%;transform:translateX(-50%);width:24px;height:9px;}
.cat-mouth::before,.cat-mouth::after{content:'';position:absolute;width:12px;height:9px;border-bottom:2.5px solid rgba(200,80,130,.55);border-radius:0 0 50% 50%;}
.cat-mouth::before{left:0;transform:rotate(-5deg);}
.cat-mouth::after{right:0;transform:rotate(5deg);}

/* Whiskers */
.wsk{position:absolute;height:1.5px;background:rgba(180,100,180,.35);border-radius:2px;top:46px;}
.w1{width:20px;left:-15px;transform:rotate(-10deg);}
.w2{width:15px;left:-12px;top:50px;transform:rotate(5deg);}
.w3{width:20px;right:-15px;transform:rotate(10deg);}
.w4{width:15px;right:-12px;top:50px;transform:rotate(-5deg);}

/* Arms */
.cat-arm{position:absolute;width:20px;height:28px;background:linear-gradient(160deg,#f0d8f0,#d8b8d8);border-radius:50%;bottom:20px;}
.cat-arm.l{left:-7px;transform:rotate(28deg);animation:armL 3.2s ease-in-out infinite;transform-origin:top center;}
.cat-arm.r{right:-7px;transform:rotate(-28deg);animation:armR 3.2s ease-in-out infinite .5s;transform-origin:top center;}
@keyframes armL{0%,100%{transform:rotate(28deg);}50%{transform:rotate(38deg);}}
@keyframes armR{0%,100%{transform:rotate(-28deg);}50%{transform:rotate(-38deg);}}
/* Paws */
.cat-paw{position:absolute;bottom:-6px;}
.cat-paw.l{left:9px;}.cat-paw.r{right:9px;}
.paw-ball{width:28px;height:15px;background:linear-gradient(90deg,#e8c8e8,#d0b0d0);border-radius:50%;}
.paw-toe{position:absolute;top:-4px;width:9px;height:9px;background:linear-gradient(135deg,#e8c8e8,#d0b0d0);border-radius:50%;}
.paw-toe:nth-child(1){left:2px;}
.paw-toe:nth-child(2){left:10px;}
.paw-toe:nth-child(3){left:18px;}

/* Floating heart from cat */
.cat-heart{position:absolute;top:-8px;left:50%;transform:translateX(-50%) scale(0);font-size:1.7rem;opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
.orb-heart{position:absolute;font-size:var(--s);opacity:0;animation:orbH var(--d) ease-out forwards var(--dl);left:50%;top:8px;pointer-events:none;}
@keyframes orbH{0%{opacity:0;transform:translateX(-50%) translate(0,0) scale(.2);}20%{opacity:1;}100%{opacity:0;transform:translateX(-50%) translate(var(--tx),var(--ty)) scale(1.3) rotate(var(--r));}}

/* ═══════════════════════════════════════════════════════════════════════════ */
/*                               BUTTONS                                      */
/* ═══════════════════════════════════════════════════════════════════════════ */
.btns{display:flex;gap:18px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:8px;}

#btnYes{
  position:relative;
  padding:14px 40px;
  font-family:'Playfair Display',serif;
  font-size:1.2rem;font-weight:700;
  color:white;
  background:linear-gradient(135deg,#ff4d79,#ff85a1,#e8507a);
  border:none;border-radius:60px;cursor:pointer;overflow:hidden;
  box-shadow:0 6px 28px rgba(255,77,121,.5),inset 0 1px 0 rgba(255,255,255,.35);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s ease;
  letter-spacing:.04em;
  animation:yGlow 2.8s ease-in-out infinite;
  transform-origin:center;
}
@keyframes yGlow{
  0%,100%{box-shadow:0 6px 28px rgba(255,77,121,.5),inset 0 1px 0 rgba(255,255,255,.35);}
  50%{box-shadow:0 8px 40px rgba(255,77,121,.7),0 0 0 10px rgba(255,77,121,.12),inset 0 1px 0 rgba(255,255,255,.35);}
}
#btnYes:hover{transform:scale(1.08) translateY(-3px)!important;box-shadow:0 12px 45px rgba(255,77,121,.65);}
#btnYes:active{transform:scale(.96)!important;}
#btnYes::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:shine 3.8s ease-in-out infinite 2s;}
@keyframes shine{0%{left:-100%;}100%{left:220%;}}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.5);transform:scale(0);animation:ripEff .65s ease-out forwards;pointer-events:none;}
@keyframes ripEff{to{transform:scale(6);opacity:0;}}

#btnNo{
  position:fixed;
  padding:12px 28px;
  font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:600;
  color:#c07090;
  background:rgba(255,255,255,.72);
  border:1.5px solid rgba(220,130,160,.42);
  border-radius:50px;cursor:pointer;
  box-shadow:0 3px 15px rgba(220,130,160,.15);
  backdrop-filter:blur(8px);
  z-index:100;
  transition:left .3s cubic-bezier(.22,1,.36,1),top .3s cubic-bezier(.22,1,.36,1);
  user-select:none;
}
#btnNo:active{transform:scale(.96);}

/* ═══════════════════════════════════════════════════════════════════════════ */
/*                             YES SCENE PREMIUM                              */
/* ═══════════════════════════════════════════════════════════════════════════ */
#yesScene{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  background:#0d0019;
  transition:opacity 1.2s ease;overflow:hidden;
}
#yesScene.active{opacity:1;pointer-events:all;}

.night-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 28%,#4a0070 0%,#1c0035 42%,#0d0019 100%);z-index:0;}
.night-aurora{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(100,200,255,0.15),transparent 70%),radial-gradient(ellipse at 70% 40%,rgba(255,100,200,0.12),transparent 70%);animation:auroraWave 8s ease-in-out infinite;}
@keyframes auroraWave{0%,100%{opacity:0.3;transform:scale(1);}50%{opacity:0.7;transform:scale(1.05);}}

.nstar{position:absolute;background:white;border-radius:50%;animation:stTw var(--d) ease-in-out infinite var(--dl);}
@keyframes stTw{0%,100%{opacity:.15;transform:scale(1);}50%{opacity:1;transform:scale(1.6);}}
.norb{position:absolute;border-radius:50%;background:var(--c);filter:blur(95px);opacity:.32;animation:orbP var(--d) ease-in-out infinite var(--dl);}
@keyframes orbP{0%,100%{transform:scale(1);opacity:.25;}50%{transform:scale(1.4);opacity:.5;}}

.conf-p{position:absolute;width:var(--w);height:var(--h);background:var(--c);border-radius:var(--r);animation:cFall var(--d) ease-in infinite var(--dl);top:-20px;}
@keyframes cFall{0%{opacity:0;transform:translateY(0) rotate(0) scaleX(1);}10%{opacity:1;}90%{opacity:.5;}100%{opacity:0;transform:translateY(110vh) rotate(var(--sp)) scaleX(-1);}}
.yfh{position:absolute;font-size:var(--s);animation:yHR var(--d) ease-in infinite var(--dl);z-index:2;filter:drop-shadow(0 0 12px rgba(255,100,150,.8));}
@keyframes yHR{0%{opacity:0;transform:translateY(0) scale(.3) rotate(var(--r));}14%{opacity:1;}86%{opacity:.55;}100%{opacity:0;transform:translateY(-108vh) scale(1.5) rotate(calc(var(--r)+220deg));}}

/* Big Cat YES Scene */
#yesCat{
  position:relative;z-index:15;margin-bottom:20px;
  animation:yesCatDance .9s ease-in-out infinite alternate;
  filter:drop-shadow(0 0 35px rgba(230,150,255,.9)) drop-shadow(0 0 70px rgba(200,100,230,.5));
}
@keyframes yesCatDance{from{transform:translateY(0) rotate(-7deg) scale(1);}to{transform:translateY(-22px) rotate(7deg) scale(1.07);}}
.ycat-hrt{position:absolute;font-size:var(--s);animation:ycH var(--d) ease-out infinite var(--dl);left:50%;top:8px;pointer-events:none;z-index:16;}
@keyframes ycH{0%{opacity:0;transform:translateX(-50%) translate(0,0) scale(.2);}18%{opacity:1;}100%{opacity:0;transform:translateX(-50%) translate(var(--tx),var(--ty)) scale(1.3);}}

/* Sparkle orbit ring */
.sp-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;pointer-events:none;z-index:4;}
.spr{position:absolute;font-size:var(--s);top:50%;left:50%;animation:sprOrb var(--d) linear infinite var(--dl);transform-origin:0 0;}
@keyframes sprOrb{0%{opacity:0;transform:rotate(var(--st)) translateX(125px) scale(0);}22%{opacity:1;transform:rotate(calc(var(--st)+90deg)) translateX(125px) scale(1);}78%{opacity:.8;}100%{opacity:0;transform:rotate(calc(var(--st)+360deg)) translateX(132px) scale(.4);}}

/* YES Text */
.yc{position:relative;z-index:10;text-align:center;padding:0 22px;}
.yt1{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,8vw,3.8rem);font-weight:700;color:#ff85a1;text-shadow:0 0 35px rgba(255,133,161,.9),0 0 85px rgba(255,100,140,.5);opacity:0;animation:tA 1s .9s ease forwards;margin-bottom:8px;}
@keyframes tA{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:none;}}
.yt2{font-family:'Dancing Script',cursive;font-size:clamp(1.2rem,4vw,1.7rem);color:#e8b8d8;opacity:0;animation:tA 1s 2.2s ease forwards;margin-bottom:8px;text-shadow:0 0 20px rgba(232,184,216,.6);}
.yt3{font-family:'Nunito',sans-serif;font-size:clamp(.9rem,3vw,1.1rem);color:#cca0c4;opacity:0;animation:tA 1s 3.4s ease forwards;font-weight:300;letter-spacing:.05em;}
.yt4{font-family:'Dancing Script',cursive;font-size:clamp(1rem,3.5vw,1.4rem);color:#ff85a1;opacity:0;animation:tA 1s 4.6s ease forwards;margin-top:12px;text-shadow:0 0 16px rgba(255,133,161,.5);}

/* Responsive */
@media(max-width:480px){
  .card{padding:26px 20px 30px;}
  .cat{width:108px;height:115px;}
  .cat-head{width:70px;height:66px;top:5px;}
  .btn-yes{padding:10px 32px;font-size:1rem;}
}
</style>
</head>
<body>

<!-- MAIN SCENE -->
<div id="scene">
  <div id="parallax-bg">
    <div class="bg-grad"></div>
    <div class="aurora"></div>
    <div id="bokehLayer"></div>
    <div id="sparkleLayer"></div>
    <div id="heartsLayer"></div>
  </div>
  <div class="vig"></div>

  <div class="card">
    <div class="deco-top">
      <div class="deco-line"></div>
      <span class="deco-em" style="--dl:0s">✦</span>
      <span class="deco-em" style="--dl:.4s">🌸</span>
      <span class="deco-em" style="--dl:.8s">💕</span>
      <span class="deco-em" style="--dl:1.2s">✦</span>
      <div class="deco-line"></div>
    </div>

    <div class="scene-label">— a little message from my heart —</div>
    <div class="conf-line1">Will You Be My</div>
    <div class="conf-line2"><em>Girlfriend?</em> <span class="hpulse">💖</span></div>
    <div class="conf-sub">this little cat is counting on you 🥺✨</div>
    <div class="hearts-row">
      <span class="hr-em" style="--dl:0s">💕</span>
      <span class="hr-em" style="--dl:.2s">🌸</span>
      <span class="hr-em" style="--dl:.4s">💗</span>
      <span class="hr-em" style="--dl:.6s">✨</span>
      <span class="hr-em" style="--dl:.8s">💖</span>
    </div>

    <!-- Chibi Cat Full Body -->
    <div class="cat-wrap" id="catWrap">
      <div style="position:relative;display:inline-block;" id="catWrapper">
        <div class="cat-heart" id="catHeart">💕</div>
        <div class="cat" id="cat">
          <div class="cat-shadow"></div>
          <div class="cat-tail"></div>
          <div class="cat-body">
            <div class="cat-stripe"></div>
            <div class="cat-belly"></div>
            <div class="cat-arm l"></div>
            <div class="cat-arm r"></div>
            <div class="cat-paw l"><div class="paw-ball"><div class="paw-toe"></div><div class="paw-toe"></div><div class="paw-toe"></div></div></div>
            <div class="cat-paw r"><div class="paw-ball"><div class="paw-toe"></div><div class="paw-toe"></div><div class="paw-toe"></div></div></div>
          </div>
          <div class="cat-head">
            <div class="cat-ear l"><div class="cat-ear-inner l"></div></div>
            <div class="cat-ear r"><div class="cat-ear-inner r"></div></div>
            <div class="cat-eye l"><div class="eye-ball"><div class="eye-shine"></div></div></div>
            <div class="cat-eye r"><div class="eye-ball"><div class="eye-shine"></div></div></div>
            <div class="cat-blush l"></div>
            <div class="cat-blush r"></div>
            <div class="cat-nose"></div>
            <div class="cat-mouth"></div>
            <div class="wsk w1"></div><div class="wsk w2"></div><div class="wsk w3"></div><div class="wsk w4"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="btns">
      <button id="btnYes">Yes 💖</button>
    </div>
  </div>
</div>

<button id="btnNo">No 😔</button>

<!-- YES SCENE -->
<div id="yesScene">
  <div class="night-bg"></div>
  <div class="night-aurora"></div>
  <div id="nightStars"></div>
  <div id="nightOrbs"></div>
  <div id="confContainer"></div>
  <div id="yesFHContainer"></div>
  <div class="sp-ring" id="spRing"></div>

  <div class="yc">
    <div id="yesCat">
      <div style="position:relative;display:inline-block;width:170px;height:175px;">
        <div id="yesCatHearts"></div>
        <div class="cat" style="width:170px;height:175px;animation:yesCatDance .9s ease-in-out infinite alternate;">
          <div class="cat-shadow" style="width:88px;"></div>
          <div class="cat-tail" style="width:28px;height:68px;bottom:10px;right:-22px;"></div>
          <div class="cat-body" style="width:110px;height:105px;">
            <div class="cat-belly" style="width:62px;height:64px;"></div>
            <div class="cat-arm l" style="width:26px;height:36px;bottom:24px;left:-9px;"></div>
            <div class="cat-arm r" style="width:26px;height:36px;bottom:24px;right:-9px;"></div>
          </div>
          <div class="cat-head" style="width:106px;height:100px;top:8px;">
            <div class="cat-ear l" style="border-left:16px solid transparent;border-right:16px solid transparent;border-bottom:36px solid #d8a8d8;left:12px;"></div>
            <div class="cat-ear r" style="border-left:16px solid transparent;border-right:16px solid transparent;border-bottom:36px solid #d8a8d8;right:12px;"></div>
            <div class="cat-eye l" style="top:28px;left:18px;"><div class="eye-ball" style="width:24px;height:25px;"></div></div>
            <div class="cat-eye r" style="top:28px;right:18px;"><div class="eye-ball" style="width:24px;height:25px;"></div></div>
            <div class="cat-blush l" style="width:22px;height:13px;filter:blur(5px);top:48px;left:12px;"></div>
            <div class="cat-blush r" style="width:22px;height:13px;filter:blur(5px);top:48px;right:12px;"></div>
            <div class="cat-nose" style="border-left:7px solid transparent;border-right:7px solid transparent;border-top:9px solid #ffaacc;top:54px;"></div>
            <div class="cat-mouth" style="top:64px;width:30px;"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="yt1">YAYYY ❤️</div>
    <div class="yt2">You just made me the happiest person 😍</div>
    <div class="yt3">I promise to cherish you, love you, and always make you smile 💖</div>
    <div class="yt4">Now we're official~ 🐱✨</div>
  </div>
</div>
<script>
// ========== BACKGROUND GENERATORS ==========
function createBokeh(){
  const layer=document.getElementById('bokehLayer');
  const cols=['rgba(255,150,180,0.38)','rgba(210,155,240,0.32)','rgba(255,200,140,0.28)','rgba(150,200,255,0.28)','rgba(255,220,230,0.42)'];
  for(let i=0;i<32;i++){
    const b=document.createElement('div');b.className='bokeh';
    const sz=55+Math.random()*240;
    b.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${cols[i%cols.length]};--d:${6+Math.random()*12}s;--dl:${-Math.random()*15}s;--o:${0.18+Math.random()*0.32};`;
    layer.appendChild(b);
  }
}
function createSparkles(){
  const layer=document.getElementById('sparkleLayer');
  for(let i=0;i<65;i++){
    const s=document.createElement('div');s.className='sp';
    const sz=4+Math.random()*16;
    s.style.cssText=`--s:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2.5+Math.random()*5.5}s;--dl:${-Math.random()*8}s;`;
    layer.appendChild(s);
  }
}
function createFallingHearts(){
  const layer=document.getElementById('heartsLayer');
  const hearts=['❤️','💖','💗','💕','💞','💘','💝','🩷'];
  for(let i=0;i<35;i++){
    const h=document.createElement('div');h.className='fh';
    h.textContent=hearts[i%hearts.length];
    h.style.cssText=`--s:${0.7+Math.random()*1.8}rem;left:${Math.random()*100}%;--d:${8+Math.random()*18}s;--dl:${-Math.random()*25}s;--r:${-40+Math.random()*80}deg;`;
    layer.appendChild(h);
  }
}
function createShootingStars(){
  setInterval(()=>{
    const star=document.createElement('div');
    star.className='shooting-star';
    star.style.left=Math.random()*80+10+'%';
    star.style.top=Math.random()*60+'%';
    star.style.animationDuration=0.8+Math.random()*1.2+'s';
    document.getElementById('parallax-bg').appendChild(star);
    setTimeout(()=>star.remove(),1500);
  },2800);
}
function createGlitters(){
  setInterval(()=>{
    const g=document.createElement('div');
    g.className='glitter';
    g.style.left=Math.random()*100+'%';
    g.style.top=Math.random()*100+'%';
    document.getElementById('parallax-bg').appendChild(g);
    setTimeout(()=>g.remove(),1500);
  },500);
}
createBokeh();createSparkles();createFallingHearts();createShootingStars();createGlitters();

// ========== CAT RANDOM ACTIONS ==========
const cat=document.getElementById('cat');
const catHeart=document.getElementById('catHeart');
let catAnimating=false;
const catActions=[
  {name:'catJump',dur:.7,rep:1},
  {name:'catSpin',dur:.85,rep:1},
  {name:'catShake',dur:.5,rep:2},
  {name:'catShy',dur:.65,rep:1},
  {name:'catWave',dur:.6,rep:2}
];
const catStyle=document.createElement('style');
catStyle.textContent=`
@keyframes catJump{0%,100%{transform:translateY(0);}30%{transform:translateY(-26px) rotate(-3deg);}65%{transform:translateY(-10px);}}
@keyframes catSpin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
@keyframes catShake{0%,100%{transform:rotate(0deg);}25%{transform:rotate(-12deg);}75%{transform:rotate(12deg);}}
@keyframes catShy{0%,100%{transform:scaleY(1);}30%{transform:scaleY(.7) translateY(10px);}}
@keyframes catWave{0%,100%{transform:rotate(0deg);}25%{transform:rotate(-18deg);}75%{transform:rotate(18deg);}}
`;
document.head.appendChild(catStyle);
function runCatAction(){
  if(catAnimating)return;
  catAnimating=true;
  const a=catActions[Math.floor(Math.random()*catActions.length)];
  cat.style.animation=`${a.name} ${a.dur}s ease-in-out ${a.rep}`;
  if(a.name==='catShy')document.querySelectorAll('.cat-blush').forEach(b=>b.style.opacity='1.2');
  setTimeout(()=>{
    cat.style.animation='catBreath 3s ease-in-out infinite';
    document.querySelectorAll('.cat-blush').forEach(b=>b.style.opacity='');
    catAnimating=false;
  },(a.dur*a.rep)*1000+150);
}
setInterval(runCatAction,3200+Math.random()*2800);

// ========== BUTTON INTERACTIONS ==========
const yesBtn=document.getElementById('btnYes');
const noBtn=document.getElementById('btnNo');
let yesScale=1,noCount=0;
const noTexts=['No... 😔','Really? 🥺','Are you sure??','Please reconsider 💔','I\'m begging u 😭','Just click YES!! 😤','Not fair!! 😭','...okay 😢','last chance 👉👈'];

function moveNo(){
  const m=25,w=noBtn.offsetWidth,h=noBtn.offsetHeight;
  const x=m+Math.random()*(innerWidth-w-m*2);
  const y=m+Math.random()*(innerHeight-h-m*2);
  noBtn.style.left=x+'px';noBtn.style.top=y+'px';
}
noBtn.style.left='65%';noBtn.style.top='72%';
noBtn.addEventListener('mouseenter',()=>{
  if(document.getElementById('yesScene').classList.contains('active'))return;
  noCount++;moveNo();
  yesScale+=0.08;if(yesScale>2.5)yesScale=2.5;
  yesBtn.style.transform=`scale(${yesScale})`;
  if(noCount<noTexts.length)noBtn.textContent=noTexts[noCount];
  cat.style.animation='catShake .3s ease-in-out 2';
  setTimeout(()=>{if(!catAnimating)cat.style.animation='catBreath 3s ease-in-out infinite';},400);
});
noBtn.addEventListener('touchstart',e=>{e.preventDefault();noBtn.dispatchEvent(new Event('mouseenter'));});
window.addEventListener('resize',()=>{if(!document.getElementById('yesScene').classList.contains('active'))moveNo();});

// ========== YES CLICK ==========
yesBtn.addEventListener('click',(e)=>{
  if(document.getElementById('yesScene').classList.contains('active'))return;
  const rect=yesBtn.getBoundingClientRect();
  const ripple=document.createElement('span');ripple.className='ripple';
  ripple.style.cssText=`width:60px;height:60px;left:${e.clientX-rect.left-30}px;top:${e.clientY-rect.top-30}px;`;
  yesBtn.appendChild(ripple);setTimeout(()=>ripple.remove(),700);
  
  cat.style.animation='catSpin .5s ease-in-out, catJump .5s .5s ease-in-out infinite alternate';
  catHeart.style.cssText='transform:translateX(-50%) scale(1.6) translateY(-24px);opacity:1;font-size:2rem;';
  setTimeout(()=>{
    document.getElementById('yesScene').classList.add('active');
    buildYesScene();
  },600);
});

function buildYesScene(){
  // stars
  const starCont=document.getElementById('nightStars');
  for(let i=0;i<130;i++){
    const s=document.createElement('div');s.className='nstar';
    const sz=1+Math.random()*4;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*85}%;--d:${1.5+Math.random()*4.5}s;--dl:${-Math.random()*7}s;`;
    starCont.appendChild(s);
  }
  // orbs
  const orbCont=document.getElementById('nightOrbs');
  const orbs=[
    {w:480,h:400,l:'3%',t:'10%',c:'rgba(160,30,220,0.38)',d:'10s',dl:'0s'},
    {w:420,h:420,l:'50%',t:'45%',c:'rgba(255,50,120,0.32)',d:'13s',dl:'-3s'},
    {w:350,h:280,l:'22%',t:'68%',c:'rgba(60,80,220,0.26)',d:'11s',dl:'-5s'},
    {w:220,h:220,l:'72%',t:'12%',c:'rgba(255,200,80,0.22)',d:'8s',dl:'-2s'},
  ];
  orbs.forEach(o=>{
    const orb=document.createElement('div');orb.className='norb';
    orb.style.cssText=`width:${o.w}px;height:${o.h}px;left:${o.l};top:${o.t};--c:${o.c};--d:${o.d};--dl:${o.dl};`;
    orbCont.appendChild(orb);
  });
  // confetti
  const confCont=document.getElementById('confContainer');
  const cols=['#ff85a1','#ffb347','#c9a9e9','#85d1ff','#ff4d79','#ffe066','#a0e080','#ffaacc'];
  for(let i=0;i<85;i++){
    const c=document.createElement('div');c.className='conf-p';
    const isRound=Math.random()>.5;
    c.style.cssText=`--w:${5+Math.random()*12}px;--h:${isRound?5+Math.random()*12:9+Math.random()*10}px;--r:${isRound?'50%':'2px'};--c:${cols[Math.floor(Math.random()*cols.length)]};left:${Math.random()*100}%;--d:${4+Math.random()*8}s;--dl:${-Math.random()*14}s;--sp:${180+Math.random()*720}deg;`;
    confCont.appendChild(c);
  }
  // floating hearts yes
  const fhCont=document.getElementById('yesFHContainer');
  const heartEmojis=['❤️','💖','💗','💕','💞','💘','💝'];
  for(let i=0;i<55;i++){
    const h=document.createElement('div');h.className='yfh';
    h.textContent=heartEmojis[i%heartEmojis.length];
    h.style.cssText=`--s:${0.9+Math.random()*2.8}rem;left:${Math.random()*100}%;bottom:0;--d:${5+Math.random()*11}s;--dl:${-Math.random()*18}s;--r:${-35+Math.random()*70}deg;`;
    fhCont.appendChild(h);
  }
  // sparkle ring
  const ring=document.getElementById('spRing');
  const ringItems=['✨','⭐','💫','🌟','🌸','💕'];
  for(let i=0;i<18;i++){
    const s=document.createElement('div');s.className='spr';
    s.textContent=ringItems[i%ringItems.length];
    s.style.cssText=`--s:${0.7+Math.random()*1.3}rem;--d:${3+Math.random()*4}s;--dl:${-Math.random()*6}s;--st:${i*(360/18)}deg;`;
    ring.appendChild(s);
  }
  // cat hearts
  const catHearts=document.getElementById('yesCatHearts');
  const hpos=[[-72,-78],[-48,-98],[5,-108],[52,-92],[78,-62],[72,-28],[-78,-42],[-55,-112]];
  hpos.forEach(([tx,ty],i)=>{
    const h=document.createElement('div');h.className='ycat-hrt';
    h.textContent=heartEmojis[i%heartEmojis.length];
    h.style.cssText=`--s:${1+Math.random()*1.3}rem;--d:${2+Math.random()*2.5}s;--dl:${i*.38+.6}s;--tx:${tx}px;--ty:${ty}px;`;
    catHearts.appendChild(h);
  });
}
</script>
</body>
</html>
